<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For Her · Tulip — Mood Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300..700&display=swap" rel="stylesheet">
<style>
  :root {
    --plum: #5B2A4A;
    --plum-deep: #3E1B33;
    --plum-soft: #8E5378;
    --teal: #2F7A7A;
    --teal-soft: #8FC4C4;
    --teal-bg: #E8F4F1;
    --rose: #F4D4DC;
    --rose-deep: #E8A8B7;
    --rose-bg: #FBF3F5;
    --gold: #C9A24A;
    --gold-soft: #E8D4A0;
    --gold-bg: #FAF1DC;
    --lavender-bg: #F5F0F6;
    --cream: #FDF9F7;
    --ink: #2A1A25;
    --ink-soft: #6B5A65;
    --line: #EADFE3;
    --white: #FFFFFF;
    --shadow-sm: 0 2px 8px rgba(91, 42, 74, 0.06);
    --shadow-md: 0 4px 20px rgba(91, 42, 74, 0.08);
    --shadow-lg: 0 8px 32px rgba(91, 42, 74, 0.12);
    --shadow-xl: 0 16px 48px rgba(91, 42, 74, 0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: #E8DFE8;
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    font-size: 16px;
    line-height: 1.5;
  }

  .app-frame {
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    background: linear-gradient(180deg, var(--rose-bg) 0%, var(--lavender-bg) 100%);
    position: relative;
    box-shadow: var(--shadow-xl);
    overflow: hidden;
    padding-bottom: 32px;
  }

  @media (min-width: 768px) {
    body { padding: 24px 0; }
    .app-frame {
      min-height: calc(100vh - 48px);
      border-radius: 32px;
      overflow: hidden;
    }
  }

  /* TOP BAR */
  .topbar {
    padding: 22px 24px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .icon-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(255,255,255,0.75);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    color: var(--plum-deep);
    font-size: 18px; cursor: pointer;
    transition: all 0.2s ease;
  }
  .icon-btn:hover { background: white; transform: translateY(-1px); }
  .icon-btn:active { transform: scale(0.94); }

  .top-title {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: var(--plum-deep);
  }
  .top-title .italic { font-style: italic; color: var(--plum-soft); }

  /* HERO */
  .hero {
    padding: 18px 24px 8px;
    animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--teal);
    background: var(--teal-bg);
    padding: 6px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    line-height: 1.2;
    color: var(--plum-deep);
    font-weight: 400;
    margin-bottom: 8px;
  }
  h1 .italic { font-style: italic; color: var(--plum-soft); }

  .lead {
    font-size: 14px;
    color: var(--ink-soft);
    max-width: 92%;
  }

  /* CARD / FORM */
  .card {
    margin: 18px 20px 0;
    background: linear-gradient(135deg, #FFFFFF 0%, var(--teal-bg) 100%);
    border: 1px solid rgba(234, 223, 227, 0.6);
    border-radius: 22px;
    padding: 22px 20px 20px;
    box-shadow: var(--shadow-sm);
    animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.05s both;
  }

  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }

  .field-label {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--plum-deep);
    margin-bottom: 10px;
  }
  .field-hint {
    font-size: 11px;
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0.2px;
    color: var(--ink-soft);
  }

  /* MOOD CHOICES */
  .mood-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .mood-btn {
    background: white;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 10px 4px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .mood-btn .emoji { font-size: 22px; display: block; margin-bottom: 4px; }
  .mood-btn .label { font-size: 10.5px; color: var(--ink-soft); font-weight: 500; }
  .mood-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
  .mood-btn.active {
    background: var(--plum-deep);
    border-color: var(--plum-deep);
  }
  .mood-btn.active .label { color: white; }

  /* ENERGY SLIDER */
  .energy-wrap {
    background: white;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px 12px;
  }
  .energy-value {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .energy-num {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--plum-deep);
  }
  .energy-tag {
    font-size: 12px;
    color: var(--ink-soft);
    font-weight: 500;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    background: linear-gradient(90deg, var(--rose-deep) 0%, var(--gold) 50%, var(--teal) 100%);
    border-radius: 6px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: white;
    border: 3px solid var(--plum-deep);
    cursor: pointer;
    box-shadow: var(--shadow-md);
  }
  input[type="range"]::-moz-range-thumb {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: white;
    border: 3px solid var(--plum-deep);
    cursor: pointer;
  }

  /* SYMPTOM CHIPS */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip {
    background: white;
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 8px 13px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
    font-family: inherit;
  }
  .chip:hover { border-color: var(--plum-soft); }
  .chip.active {
    background: var(--plum-deep);
    color: white;
    border-color: var(--plum-deep);
  }

  /* NOTES */
  textarea {
    width: 100%;
    min-height: 64px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 13.5px;
    color: var(--ink);
    resize: vertical;
    transition: border-color 0.2s ease;
  }
  textarea:focus {
    outline: none;
    border-color: var(--plum-soft);
  }

  /* SAVE BUTTON */
  .save-btn {
    width: 100%;
    margin-top: 18px;
    background: var(--plum-deep);
    color: white;
    border: none;
    padding: 14px 18px;
    border-radius: 16px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .save-btn:hover { background: var(--plum); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .save-btn:active { transform: scale(0.98); }
  .save-btn:disabled {
    background: var(--line);
    color: var(--ink-soft);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* RECENT LOGS */
  .recent {
    margin: 22px 20px 0;
  }
  .recent-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px 10px;
  }
  .recent-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .recent-clear {
    background: none;
    border: none;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--plum-soft);
    cursor: pointer;
    font-family: inherit;
  }
  .recent-clear:hover { color: var(--plum-deep); text-decoration: underline; }

  .log-empty {
    background: rgba(255,255,255,0.65);
    border: 1px dashed var(--line);
    border-radius: 16px;
    padding: 22px 18px;
    text-align: center;
    font-size: 13px;
    color: var(--ink-soft);
  }

  .log-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .log-item {
    background: white;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 12px 14px;
    box-shadow: var(--shadow-sm);
    animation: cardIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .log-row1 {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .log-mood {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--plum-deep);
  }
  .log-mood .emoji { font-size: 20px; }
  .log-time {
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.3px;
  }
  .log-meta {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .log-meta strong { color: var(--plum); font-weight: 600; }
  .log-symptoms {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 6px;
  }
  .log-tag {
    font-size: 11px;
    background: var(--rose-bg);
    color: var(--plum-deep);
    padding: 3px 8px;
    border-radius: 999px;
  }
  .log-note {
    margin-top: 8px;
    font-size: 12.5px;
    color: var(--ink);
    line-height: 1.45;
    background: var(--cream);
    border-radius: 10px;
    padding: 8px 10px;
  }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: var(--plum-deep);
    color: white;
    padding: 12px 20px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 100;
    max-width: 340px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="app-frame">

  <!-- TOP BAR -->
  <div class="topbar">
    <button class="icon-btn" onclick="goBack()" aria-label="Back">‹</button>
    <div class="top-title">Mood <span class="italic">Log</span></div>
    <div class="icon-btn" style="visibility:hidden;">·</div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <span class="eyebrow">Right now</span>
    <h1>How are you <span class="italic">feeling?</span></h1>
    <p class="lead">A quick check-in — your mood, energy and any symptoms you're noticing.</p>
  </div>

  <!-- FORM CARD -->
  <div class="card">

    <!-- MOOD -->
    <div class="field">
      <div class="field-label">
        Mood
        <span class="field-hint" id="moodHint">Tap one</span>
      </div>
      <div class="mood-row" id="moodRow">
        <button type="button" class="mood-btn" data-mood="Awful"><span class="emoji">😞</span><span class="label">Awful</span></button>
        <button type="button" class="mood-btn" data-mood="Low"><span class="emoji">😕</span><span class="label">Low</span></button>
        <button type="button" class="mood-btn" data-mood="Okay"><span class="emoji">😐</span><span class="label">Okay</span></button>
        <button type="button" class="mood-btn" data-mood="Good"><span class="emoji">🙂</span><span class="label">Good</span></button>
        <button type="button" class="mood-btn" data-mood="Great"><span class="emoji">😊</span><span class="label">Great</span></button>
      </div>
    </div>

    <!-- ENERGY -->
    <div class="field">
      <div class="field-label">
        Energy
        <span class="field-hint" id="energyHint">Slide 1–10</span>
      </div>
      <div class="energy-wrap">
        <div class="energy-value">
          <span class="energy-num" id="energyNum">5</span>
          <span class="energy-tag" id="energyTag">Balanced</span>
        </div>
        <input type="range" id="energy" min="1" max="10" step="1" value="5" />
      </div>
    </div>

    <!-- SYMPTOMS -->
    <div class="field">
      <div class="field-label">
        Symptoms
        <span class="field-hint">Tap any that apply</span>
      </div>
      <div class="chips" id="chips">
        <button type="button" class="chip" data-s="Cramps">Cramps</button>
        <button type="button" class="chip" data-s="Headache">Headache</button>
        <button type="button" class="chip" data-s="Fatigue">Fatigue</button>
        <button type="button" class="chip" data-s="Bloating">Bloating</button>
        <button type="button" class="chip" data-s="Acne">Acne</button>
        <button type="button" class="chip" data-s="Anxiety">Anxiety</button>
        <button type="button" class="chip" data-s="Insomnia">Insomnia</button>
        <button type="button" class="chip" data-s="Cravings">Cravings</button>
        <button type="button" class="chip" data-s="Tender breasts">Tender breasts</button>
        <button type="button" class="chip" data-s="Nausea">Nausea</button>
        <button type="button" class="chip" data-s="Back pain">Back pain</button>
      </div>
    </div>

    <!-- NOTES -->
    <div class="field">
      <div class="field-label">Notes <span class="field-hint">Optional</span></div>
      <textarea id="notes" placeholder="Anything else worth noting?"></textarea>
    </div>

    <button type="button" class="save-btn" id="saveBtn" disabled>
      Save entry <span aria-hidden="true">✓</span>
    </button>
  </div>

  <!-- RECENT LOGS -->
  <div class="recent">
    <div class="recent-head">
      <span class="recent-title">Recent entries</span>
      <button type="button" class="recent-clear" id="clearBtn" style="display:none;">Clear all</button>
    </div>
    <div id="logList"></div>
  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  const STORAGE_KEY = 'tulip_mood_logs_v1';

  const state = {
    mood: null,
    energy: 5,
    symptoms: new Set(),
  };

  const moodEmoji = {
    'Awful': '😞', 'Low': '😕', 'Okay': '😐', 'Good': '🙂', 'Great': '😊'
  };
  const energyTagFor = (v) => {
    v = Number(v);
    if (v <= 2) return 'Drained';
    if (v <= 4) return 'Low';
    if (v <= 6) return 'Balanced';
    if (v <= 8) return 'Energetic';
    return 'Charged';
  };

  // Mood selection
  const moodRow = document.getElementById('moodRow');
  moodRow.addEventListener('click', (e) => {
    const btn = e.target.closest('.mood-btn');
    if (!btn) return;
    moodRow.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.mood = btn.dataset.mood;
    document.getElementById('moodHint').textContent = state.mood;
    refreshSaveBtn();
  });

  // Energy slider
  const energyEl = document.getElementById('energy');
  const energyNum = document.getElementById('energyNum');
  const energyTag = document.getElementById('energyTag');
  energyEl.addEventListener('input', () => {
    state.energy = Number(energyEl.value);
    energyNum.textContent = state.energy;
    energyTag.textContent = energyTagFor(state.energy);
  });

  // Symptom chips
  const chipsEl = document.getElementById('chips');
  chipsEl.addEventListener('click', (e) => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    const s = chip.dataset.s;
    if (state.symptoms.has(s)) {
      state.symptoms.delete(s);
      chip.classList.remove('active');
    } else {
      state.symptoms.add(s);
      chip.classList.add('active');
    }
  });

  // Save
  const saveBtn = document.getElementById('saveBtn');
  function refreshSaveBtn() {
    saveBtn.disabled = !state.mood;
  }

  saveBtn.addEventListener('click', () => {
    if (!state.mood) return;
    const entry = {
      id: Date.now(),
      ts: new Date().toISOString(),
      mood: state.mood,
      energy: state.energy,
      symptoms: Array.from(state.symptoms),
      notes: document.getElementById('notes').value.trim(),
    };
    const logs = readLogs();
    logs.unshift(entry);
    writeLogs(logs);
    renderLogs();
    resetForm();
    showToast('Entry saved');
  });

  function resetForm() {
    state.mood = null;
    state.symptoms.clear();
    document.getElementById('moodHint').textContent = 'Tap one';
    moodRow.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    chipsEl.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    document.getElementById('notes').value = '';
    energyEl.value = 5;
    state.energy = 5;
    energyNum.textContent = '5';
    energyTag.textContent = energyTagFor(5);
    refreshSaveBtn();
  }

  // Storage
  function readLogs() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch { return []; }
  }
  function writeLogs(logs) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
  }

  function relTime(iso) {
    const t = new Date(iso).getTime();
    const diff = Math.max(0, Date.now() - t);
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return m + ' min ago';
    const h = Math.floor(m / 60);
    if (h < 24) return h + ' hr ago';
    const d = Math.floor(h / 24);
    if (d < 7) return d + ' day' + (d === 1 ? '' : 's') + ' ago';
    return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  // Render logs
  const logList = document.getElementById('logList');
  const clearBtn = document.getElementById('clearBtn');

  function renderLogs() {
    const logs = readLogs();
    if (!logs.length) {
      logList.innerHTML = '<div class="log-empty">No entries yet — your first log will appear here.</div>';
      clearBtn.style.display = 'none';
      return;
    }
    clearBtn.style.display = '';
    logList.innerHTML = '<div class="log-list">' + logs.map(e => {
      const symptomsHtml = e.symptoms && e.symptoms.length
        ? '<div class="log-symptoms">' + e.symptoms.map(s => '<span class="log-tag">' + escapeHtml(s) + '</span>').join('') + '</div>'
        : '';
      const noteHtml = e.notes
        ? '<div class="log-note">' + escapeHtml(e.notes) + '</div>'
        : '';
      return (
        '<div class="log-item">' +
          '<div class="log-row1">' +
            '<div class="log-mood"><span class="emoji">' + (moodEmoji[e.mood] || '·') + '</span>' + escapeHtml(e.mood) + '</div>' +
            '<div class="log-time">' + relTime(e.ts) + '</div>' +
          '</div>' +
          '<div class="log-meta">Energy <strong>' + e.energy + '/10</strong> · ' + energyTagFor(e.energy) + '</div>' +
          symptomsHtml +
          noteHtml +
        '</div>'
      );
    }).join('') + '</div>';
  }

  clearBtn.addEventListener('click', () => {
    if (!confirm('Clear all mood entries?')) return;
    writeLogs([]);
    renderLogs();
    showToast('All entries cleared');
  });

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  // Refresh relative times every minute
  setInterval(renderLogs, 60000);

  // Back navigation
  function goBack() {
    document.querySelector('.app-frame').style.transition = 'opacity 0.25s ease';
    document.querySelector('.app-frame').style.opacity = '0.85';
    setTimeout(() => { window.location.href = 'index.html'; }, 160);
  }

  // Toast
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      t.style.transform = 'translateX(-50%) translateY(120%)';
    }, 1800);
  }

  // Init
  energyTag.textContent = energyTagFor(5);
  renderLogs();
</script>
</body>
</html>
