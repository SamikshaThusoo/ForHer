<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Her · Community</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300..700&display=swap" rel="stylesheet">
<style>
  :root {
    --plum: #5B2A4A; --plum-deep: #3E1B33; --plum-soft: #8E5378;
    --rose-bg: #FBF3F5; --lavender-bg: #F5F0F6; --ink: #3E1B33; --ink-soft: #6B5A65;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: #E9E3EC; color: var(--ink);
    display: flex; justify-content: center; min-height: 100vh;
  }
  .app {
    width: 100%; max-width: 420px; min-height: 100vh;
    background: linear-gradient(180deg, var(--rose-bg) 0%, var(--lavender-bg) 100%);
    box-shadow: 0 0 40px rgba(91,42,74,0.1); position: relative; padding-bottom: 28px;
  }
  .topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 18px 6px;
  }
  .back-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid rgba(91,42,74,0.16); background: #fff; color: var(--plum);
    font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    text-decoration: none; flex: 0 0 auto;
  }
  .brand { display: flex; align-items: center; gap: 8px; }
  .brand-mark {
    width: 28px; height: 28px; border-radius: 9px;
    background: linear-gradient(135deg, var(--plum) 0%, #C97A8E 100%);
    color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px;
  }
  .brand-name { font-size: 14px; font-weight: 700; color: var(--plum); }

  /* Compact phase hero — one line, lets content start higher */
  .hero { padding: 10px 18px 12px; }
  .hero .phase-chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.3px; color: var(--plum-soft);
    background: rgba(142,83,120,0.1); border-radius: 999px; padding: 5px 11px;
  }
  .hero .phase-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--plum-soft); }
  .hero h1 { font-family: 'DM Serif Display', serif; font-size: 21px; line-height: 1.18; color: var(--plum-deep); margin-top: 9px; }
  .hero h1 em { color: var(--plum-soft); font-style: italic; }

  .wrap { padding: 0 18px; }

  /* Section eyebrow between zones */
  .zone-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase;
    color: #9A8A92; margin: 18px 2px 10px;
  }
  .zone-label::after { content: ""; flex: 1; height: 1px; background: rgba(91,42,74,0.08); }

  /* Wellness video banner */
  .cvideo {
    position: relative; display: block; width: 100%;
    border: none; cursor: pointer; font-family: inherit; text-align: left;
    border-radius: 18px; overflow: hidden; padding: 0; margin-bottom: 2px;
    min-height: 124px; box-shadow: 0 8px 22px rgba(91,42,74,0.16);
    background: linear-gradient(135deg, var(--v-accent, #8E5378) 0%, rgba(62,27,51,0.94) 100%);
  }
  .cvideo::before {
    content: ""; position: absolute; right: -20px; bottom: -30px; width: 150px; height: 150px;
    border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0) 70%);
  }
  .cvideo-inner { position: relative; padding: 16px 16px 15px; color: #fff; height: 100%; display: flex; flex-direction: column; }
  .cvideo-eyebrow { font-size: 10px; font-weight: 800; letter-spacing: 0.6px; text-transform: uppercase; opacity: 0.85; }
  .cvideo-title { font-size: 17px; font-weight: 800; margin-top: 6px; max-width: 70%; line-height: 1.2; }
  .cvideo-foot { margin-top: auto; display: flex; align-items: center; gap: 9px; padding-top: 14px; }
  .cvideo-play {
    width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.95);
    color: var(--v-accent, #8E5378); display: flex; align-items: center; justify-content: center;
    font-size: 13px; padding-left: 3px; flex: 0 0 auto;
  }
  .cvideo-dur { font-size: 11.5px; font-weight: 700; opacity: 0.92; }
</style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <a class="back-btn" href="index.html" id="fhCBack" aria-label="Back">‹</a>
      <div class="brand"><div class="brand-mark">❀</div><div class="brand-name">For Her · Community</div></div>
    </div>

    <div class="hero">
      <span class="phase-chip"><span class="dot"></span><span id="phaseChip">Your phase · community</span></span>
      <h1>Tools &amp; women in your <em id="phaseWord">phase</em></h1>
    </div>

    <div class="wrap">
      <!-- 1 · Diet scanner (hero tool) -->
      <div id="scannerMount"></div>

      <!-- 2 · Wellness video -->
      <div class="zone-label">Wellness session</div>
      <div id="videoMount"></div>

      <!-- 3 · Community tips + your voice -->
      <div class="zone-label">From your community</div>
      <div id="communityMount"></div>
    </div>
  </div>

  <script src="forher-scanner.js"></script>
  <script src="forher-community.js"></script>
  <script>
    (function () {
      // Back returns to wherever the user came from (home card or cycle view),
      // not a fresh cycle.html (which would auto-skip into the tracker).
      var back = document.getElementById('fhCBack');
      if (back) back.addEventListener('click', function (e) {
        if (history.length > 1) { e.preventDefault(); history.back(); }
      });

      var phase = (typeof currentPhaseFromStorage === 'function' && currentPhaseFromStorage()) || 'follicular';
      var intent = (typeof currentIntentFromStorage === 'function' && currentIntentFromStorage()) || 'cycle';

      var cap = phase.charAt(0).toUpperCase() + phase.slice(1);
      document.getElementById('phaseChip').textContent = cap + ' phase · community';
      document.getElementById('phaseWord').textContent = phase + ' phase';

      // 1 · Diet scanner — the hero tool.
      if (typeof renderScannerEntry === 'function') {
        renderScannerEntry(document.getElementById('scannerMount'), { phase: phase, intent: intent });
      }

      // 2 · Wellness video for this phase + intent.
      if (typeof getCommunityVideo === 'function') {
        var v = getCommunityVideo(phase, intent);
        if (v) {
          var m = document.getElementById('videoMount');
          var btn = document.createElement('button');
          btn.className = 'cvideo';
          btn.style.setProperty('--v-accent', v.accent);
          btn.innerHTML =
            '<span class="cvideo-inner">' +
              '<span class="cvideo-eyebrow">Guided session</span>' +
              '<span class="cvideo-title">' + v.title + '</span>' +
              '<span class="cvideo-foot"><span class="cvideo-play">▶</span><span class="cvideo-dur">' + v.duration + ' · For your ' + phase + ' phase</span></span>' +
            '</span>';
          btn.addEventListener('click', function () { if (v.url) window.open(v.url, '_blank'); });
          m.appendChild(btn);
        } else {
          // No video for this phase — drop the label too.
          var lbl = document.querySelector('.zone-label');
          if (lbl) lbl.style.display = 'none';
        }
      }

      // 3 · Community tips (swipe rail) + collapsed share + your thoughts.
      if (typeof renderCommunity === 'function') {
        renderCommunity(document.getElementById('communityMount'), phase, intent, {
          layout: 'rail', collapseContrib: true, hideHead: true
        });
      }
    })();
  </script>
</body>
</html>
